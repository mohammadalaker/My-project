<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/triangle.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://supabase.co" />
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
    as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" />
  </noscript>
  <title>MaslamaniSales</title>
  <style>
    #root-loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(165deg,#f8fafc 0%,#f1f5f9 100%);font-family:system-ui,-apple-system,sans-serif;}
    #root-loading .spinner{width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:root-spin .8s linear infinite;}
    @keyframes root-spin{to{transform:rotate(360deg);}}
    #root-loading .text{margin-top:1rem;font-size:.875rem;color:#64748b;font-weight:500;}
  </style>
</head>

<body>
  <div id="root">
    <div id="root-loading">
      <div class="spinner" aria-hidden="true"></div>
      <p class="text">Loading…</p>
    </div>
  </div>
  <script>
    window.onerror = function (msg, url, line) {
      var el = document.getElementById('root');
      if (el) el.innerHTML = '<div style="font-family:system-ui;padding:2rem;max-width:480px;margin:0 auto;color:#dc2626;"><p><strong>Script error:</strong> ' + (msg || 'unknown') + '</p><p>Check console (F12) for details.</p></div>';
    };
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
